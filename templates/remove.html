<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Remove Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5">
        <h1 class="text-center display-5 mb-4">Remove a Game</h1>

        <div class="text-center mb-4">
            <a href="/" class="btn btn-outline-light">Back to Home</a>
            <a href="/games" class="btn btn-primary">View Vault</a>
        </div>
        <hr class="border-light mb-4">

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success text-center fw-bold">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% if not vault %}
            <div class="alert alert-warning text-center text-dark fw-bold">Your vault is currently empty! There is nothing to remove.</div>
        {% else %}
            <div class="card text-bg-secondary shadow mt-4">
                <div class="card-body p-4 text-center">
                    <form action="/remove" method="POST" onsubmit="return confirm('Are you sure you want to delete this game?');">

                        <label for="title" class="form-label fw-bold mb-3 fs-5">Select a game to permanently remove:</label>

                        <select id="title" name="title" class="form-select form-select-lg mb-4">
                            {% for title in vault.keys() %}
                                <option value="{{ title }}">{{ title }}</option>
                            {% endfor %}
                        </select>

                        <button type="submit" class="btn btn-danger btn-lg w-100">Remove Game</button>
                    </form>
                </div>
            </div>
        {% endif %}

    </div>
</body>
</html>
